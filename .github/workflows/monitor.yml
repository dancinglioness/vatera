name: Vatera oleander monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (GitHub's floor); each run polls ~60s internally
  workflow_dispatch: {}      # lets you run it by hand from the Actions tab

permissions:
  contents: write            # so the run can commit the updated seen-list back

concurrency:
  group: vatera-monitor
  cancel-in-progress: false  # never let two runs overlap

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install curl_cffi

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # KEYWORDS: "molly,apricot"   # optional: uncomment to alert on only these
        run: python vatera_monitor.py

      - name: Persist seen-list if it changed
        run: |
          if [ -n "$(git status --porcelain vatera_seen.json)" ]; then
            git config user.name  "vatera-bot"
            git config user.email "vatera-bot@users.noreply.github.com"
            git add vatera_seen.json
            git commit -m "update seen listings"
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push
          else
            echo "no change to seen-list"
          fi
